<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seedling Bob Habit Tracker</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b1220;
  color: #e6f1ff;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  background: #111a2e;
  border-bottom: 2px solid #1e4bd8;
}

.bob {
  font-size: 60px;
  animation: bob 2.5s infinite ease-in-out;
}

@keyframes bob {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.stage {
  color: #6ee7b7;
  font-size: 13px;
  margin-top: 5px;
}

.phrase {
  font-size: 14px;
  color: #93c5fd;
  min-height: 20px;
  margin-top: 5px;
}

.stats {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 8px;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #121b2f;
  border: 1px solid #223;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 12px;
}

.title {
  font-size: 15px;
  margin-bottom: 8px;
}

.progress {
  height: 10px;
  background: #1f2a44;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}

.bar {
  height: 100%;
  background: linear-gradient(90deg,#1e4bd8,#3b82f6);
  width: 0%;
  transition: width 0.3s;
}

.controls {
  display: flex;
  gap: 8px;
}

button {
  background: #1e4bd8;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover { background: #3b82f6; }

.small {
  font-size: 12px;
  color: #9ca3af;
}

/* STREAK BADGE */
.streak {
  display: inline-block;
  background: rgba(30,75,216,0.2);
  border: 1px solid #1e4bd8;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="header">
  <div class="bob">🌱🤓</div>
  <div class="stage" id="stage">Seedling Bob — Level 1</div>
  <div class="phrase" id="phrase">Booting habit engine...</div>
  <div class="stats">
    XP: <span id="xp">0</span> | Level: <span id="level">1</span> | 🔥 Streak: <span id="streak">0</span>
  </div>
</div>

<div class="container" id="app"></div>

<script>
/* ---------------- DATA ---------------- */

const phrases = [
  "New commit detected… nice.",
  "Your streak is compiling…",
  "Bug fixed: consistency restored.",
  "Pushing habits to production 🌱",
  "Refactoring your life…",
  "Cache updated: discipline++",
  "You just shipped consistency.",
  "Low hydration detected (again).",
  "Daily build successful.",
  "This streak is getting dangerous 👀"
];

const habits = [
  { name: "Drink 8 glasses of water", goal: 8, progress: 0 },
  { name: "30 minutes of movement", goal: 1, progress: 0 },
  { name: "Write 20 lines of code", goal: 20, progress: 0 }
];

/* ---------------- STORAGE KEYS ---------------- */

const TODAY = new Date().toISOString().split("T")[0];
const SAVE_KEY = "bob_habits_v2";
const STREAK_KEY = "bob_streak";
const LAST_DATE_KEY = "bob_last_date";

/* ---------------- STATE ---------------- */

let xp = 0;
let streak = parseInt(localStorage.getItem(STREAK_KEY) || "0");
let lastDate = localStorage.getItem(LAST_DATE_KEY);

/* reset daily progress if new day */
if (lastDate !== TODAY) {
  streak = (lastDate && isYesterday(lastDate, TODAY)) ? streak + 1 : 1;
  localStorage.setItem(STREAK_KEY, streak);
  localStorage.setItem(LAST_DATE_KEY, TODAY);
  saveHabits(true);
}

/* ---------------- UTIL ---------------- */

function isYesterday(prev, now) {
  const p = new Date(prev);
  const n = new Date(now);
  const diff = (n - p) / (1000*60*60*24);
  return diff === 1;
}

function stageFromXP(xp) {
  if (xp < 10) return "🌱 Seedling Bob — Level 1";
  if (xp < 30) return "🪴 Sprout Bob — Level 2";
  if (xp < 60) return "🌿 Growing Bob — Level 3";
  return "🌳 Fully Grown Bob — Level 4";
}

/* ---------------- SAVE / LOAD ---------------- */

function saveHabits(reset=false) {
  if (reset) {
    habits.forEach(h => h.progress = 0);
  }
  localStorage.setItem(SAVE_KEY, JSON.stringify(habits));
}

function loadHabits() {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    const data = JSON.parse(saved);
    data.forEach((h,i) => habits[i].progress = h.progress);
  }
}

/* ---------------- RENDER ---------------- */

const app = document.getElementById("app");
const phraseEl = document.getElementById("phrase");
const stageEl = document.getElementById("stage");
const xpEl = document.getElementById("xp");
const levelEl = document.getElementById("level");
const streakEl = document.getElementById("streak");

function render() {
  app.innerHTML = "";

  habits.forEach((h, i) => {
    const percent = (h.progress / h.goal) * 100;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${h.name}</div>

      <div class="progress">
        <div class="bar" style="width:${percent}%"></div>
      </div>

      <div class="small">${h.progress}/${h.goal}</div>

      <div class="controls">
        <button onclick="add(${i})">+ progress</button>
        <button onclick="reset(${i})">reset</button>
      </div>
    `;

    app.appendChild(card);
  });
}

/* ---------------- GAME LOGIC ---------------- */

function add(i) {
  const h = habits[i];
  if (h.progress < h.goal) {
    h.progress++;

    xp += 2;

    if (h.progress === h.goal) {
      xp += 5; // completion bonus
    }

    saveHabits();
    updateUI();
    render();
  }
}

function reset(i) {
  habits[i].progress = 0;
  saveHabits();
  updateUI();
  render();
}

/* ---------------- UI UPDATE ---------------- */

function updateUI() {
  stageEl.textContent = stageFromXP(xp);
  xpEl.textContent = xp;
  levelEl.textContent = Math.floor(xp / 20) + 1;
  streakEl.textContent = streak;

  phraseEl.textContent =
    phrases[Math.floor(Math.random() * phrases.length)];
}

/* ---------------- INIT ---------------- */

loadHabits();
render();
updateUI();

/* auto phrase loop */
setInterval(() => {
  phraseEl.textContent =
    phrases[Math.floor(Math.random() * phrases.length)];
}, 5000);
</script>

</body>
</html>
