<script>

const habits = ["water", "active", "sleep", "stress"];

const todayISO = () =>
  new Date().toISOString().slice(0, 10);

function loadHabit(id) {
  return JSON.parse(localStorage.getItem(id)) || { days: [] };
}

function saveHabit(id, data) {
  localStorage.setItem(id, JSON.stringify(data));
}

function getStreak(set) {
  let streak = 0;
  let d = new Date();

  while (true) {
    const iso = d.toISOString().slice(0, 10);

    if (set.has(iso)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }

  return streak;
}

function getPlant(streak) {
  if (streak >= 30) return "🌳";
  if (streak >= 14) return "🌷";
  if (streak >= 7) return "🌿";
  if (streak >= 3) return "🌱";
  return "🌰";
}

function animatePlant(el, newEmoji) {
  el.style.transform = "scale(0.7)";
  el.style.opacity = "0.3";

  setTimeout(() => {
    el.textContent = newEmoji;
    el.style.transform = "scale(1)";
    el.style.opacity = "1";
  }, 120);
}

function updateUI(id) {
  const data = loadHabit(id);
  const set = new Set(data.days);

  const streak = getStreak(set);

  const checkbox = document.querySelector(`input[data-id="${id}"]`);
  const plant = checkbox.parentElement.querySelector(".plant");

  const newPlant = getPlant(streak);

  animatePlant(plant, newPlant);
}

function toggleToday(id) {
  const data = loadHabit(id);
  const set = new Set(data.days);

  const today = todayISO();

  if (set.has(today)) {
    set.delete(today);
  } else {
    set.add(today);
  }

  saveHabit(id, { days: [...set] });

  updateUI(id);
}

/* INIT */
document.querySelectorAll(".habit-check").forEach((checkbox) => {

  const id = checkbox.dataset.id;

  updateUI(id);

  checkbox.addEventListener("change", () => {
    toggleToday(id);
  });

});

/* BREATHING TOOL */
const button = document.getElementById("breathe-toggle");
const box = document.getElementById("breathing-box");
const text = document.getElementById("breathing-text");

button.addEventListener("click", () => {
  box.classList.toggle("active");
});

const phases = ["Breathe In", "Hold", "Breathe Out", "Hold"];

let i = 0;

setInterval(() => {
  if (!text) return;
  text.textContent = phases[i];
  i = (i + 1) % phases.length;
}, 2000);

</script>
