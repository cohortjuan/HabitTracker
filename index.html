<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seedling Bob Habit Tracker</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b1220;
  color: #e6f1ff;
}

/* APP SHELL (mobile-first widget feel) */
.app {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER CARD */
.header {
  background: #111a2e;
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid #1e4bd8;
}

/* SVG BOB */
.bob-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

svg {
  width: 120px;
  height: 160px;
}

/* blink animation */
.eye {
  animation: blink 4s infinite;
  transform-origin: center;
}

@keyframes blink {
  0%, 96%, 100% { transform: scaleY(1); }
  97% { transform: scaleY(0.1); }
}

/* stem grow via CSS variable */
#stem {
  transform-origin: bottom;
  transform: scaleY(var(--grow, 1));
  transition: transform 0.5s ease;
}

.stage {
  font-size: 13px;
  color: #6ee7b7;
}

.stats {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 6px;
}

.phrase {
  font-size: 13px;
  color: #93c5fd;
  min-height: 18px;
  margin-top: 6px;
}

/* MAIN AREA */
.content {
  flex: 1;
  padding: 12px;
}

/* HABIT CARD */
.card {
  background: #121b2f;
  border: 1px solid #223;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.title {
  font-size: 14px;
  margin-bottom: 6px;
}

.progress {
  height: 8px;
  background: #1f2a44;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: linear-gradient(90deg,#1e4bd8,#3b82f6);
  width: 0%;
  transition: width 0.3s;
}

.meta {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 6px;
}

/* BOTTOM ACTION BAR (mobile UX) */
.actions {
  position: sticky;
  bottom: 0;
  background: #0b1220;
  padding: 10px;
  border-top: 1px solid #1e4bd8;
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1e4bd8;
  color: white;
  font-weight: 600;
}

button:active {
  transform: scale(0.98);
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">

    <div class="bob-wrap">

      <!-- 🌿 SEEDLING BOB SVG -->
      <svg viewBox="0 0 120 160">

        <!-- STEM (grows) -->
        <rect id="stem" x="58" y="60" width="4" height="60" fill="#22c55e"/>

        <!-- LEAF -->
        <path id="leaf"
          d="M60 60 C40 40, 30 70, 60 75 C90 70, 80 40, 60 60"
          fill="#16a34a"/>

        <!-- HEAD -->
        <circle cx="60" cy="40" r="18" fill="#a3e635"/>

        <!-- GLASSES -->
        <circle cx="54" cy="40" r="5" stroke="#0f172a" stroke-width="2" fill="none"/>
        <circle cx="66" cy="40" r="5" stroke="#0f172a" stroke-width="2" fill="none"/>
        <line x1="59" y1="40" x2="61" y2="40" stroke="#0f172a" stroke-width="2"/>

        <!-- EYES -->
        <circle class="eye" cx="54" cy="40" r="2" fill="#0f172a"/>
        <circle class="eye" cx="66" cy="40" r="2" fill="#0f172a"/>

      </svg>

    </div>

    <div class="stage" id="stage">Seedling Bob — Level 1</div>
    <div class="stats">
      XP <span id="xp">0</span> | 🔥 Streak <span id="streak">0</span>
    </div>
    <div class="phrase" id="phrase">Booting growth system...</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="app"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="resetAll()">Reset Day</button>
    <button onclick="boost()">Debug Boost</button>
  </div>

</div>

<script>

/* ---------------- DATA ---------------- */

const phrases = [
  "Commit received… growth compiling.",
  "Your streak is stabilizing.",
  "Bug fixed: discipline restored.",
  "Pushing habits to production 🌱",
  "Leaf expansion detected.",
  "Refactoring lifestyle module…",
  "System check: looking healthy.",
  "Warning: hydration subsystem low.",
  "Daily build passed.",
  "You’re scaling fast 👀"
];

const habits = [
  { name: "Drink 8 glasses of water", goal: 8, progress: 0 },
  { name: "30 min movement", goal: 1, progress: 0 },
  { name: "Write 20 lines of code", goal: 20, progress: 0 }
];

/* ---------------- STORAGE ---------------- */

const TODAY = new Date().toISOString().split("T")[0];
const KEY = "seedling_bob_v3";
const STREAK_KEY = "streak_v3";
const LAST_KEY = "last_v3";

let xp = 0;
let streak = parseInt(localStorage.getItem(STREAK_KEY) || "0");
let last = localStorage.getItem(LAST_KEY);

/* new day logic */
if (last !== TODAY) {
  streak = last ? streak + 1 : 1;
  localStorage.setItem(STREAK_KEY, streak);
  localStorage.setItem(LAST_KEY, TODAY);
}

/* ---------------- ELEMENTS ---------------- */

const app = document.getElementById("app");
const phrase = document.getElementById("phrase");
const stage = document.getElementById("stage");
const xpEl = document.getElementById("xp");
const streakEl = document.getElementById("streak");
const stem = document.getElementById("stem");
const leaf = document.getElementById("leaf");

/* ---------------- UI ---------------- */

function render() {
  app.innerHTML = "";

  habits.forEach((h, i) => {
    const pct = (h.progress / h.goal) * 100;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${h.name}</div>
      <div class="progress">
        <div class="bar" style="width:${pct}%"></div>
      </div>
      <div class="meta">${h.progress}/${h.goal}</div>
      <button onclick="add(${i})">+ progress</button>
    `;

    app.appendChild(div);
  });
}

/* ---------------- BOB GROWTH ---------------- */

function updateBob() {
  const total = habits.reduce((a,b)=>a+b.progress,0);

  xpEl.textContent = xp;
  streakEl.textContent = streak;

  // level
  let level = 1;
  if (xp > 10) level = 2;
  if (xp > 30) level = 3;
  if (xp > 60) level = 4;

  stage.textContent =
    ["🌱 Seed Bob","🪴 Sprout Bob","🌿 Growing Bob","🌳 Fully Grown Bob"][level-1];

  // growth scaling
  const grow = 1 + (xp / 80);
  stem.style.setProperty("--grow", Math.min(grow, 2));

  leaf.style.transform = `scale(${1 + xp/120})`;

  phrase.textContent =
    phrases[Math.floor(Math.random()*phrases.length)];
}

/* ---------------- ACTIONS ---------------- */

function add(i) {
  const h = habits[i];
  if (h.progress < h.goal) {
    h.progress++;
    xp += 2;

    if (h.progress === h.goal) xp += 5;

    save();
    render();
    updateBob();
  }
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(habits));
}

function load() {
  const d = localStorage.getItem(KEY);
  if (d) {
    const parsed = JSON.parse(d);
    parsed.forEach((h,i)=>habits[i].progress = h.progress);
  }
}

function resetAll() {
  habits.forEach(h => h.progress = 0);
  xp = 0;
  save();
  render();
  updateBob();
}

function boost() {
  xp += 10;
  updateBob();
}

/* ---------------- INIT ---------------- */

load();
render();
updateBob();

setInterval(() => {
  phrase.textContent =
    phrases[Math.floor(Math.random()*phrases.length)];
}, 5000);

</script>

</body>
</html>
