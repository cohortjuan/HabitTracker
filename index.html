<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seedling Bob XP Tracker</title>

<style>
:root{
  --bg:#0b1020;
  --card:#121a2a;
  --card2:#0f1626;
  --text:#eaf1ff;
  --muted:#7f8aa3;

  --green:#3ef0a8;
  --blue:#4aa3ff;
  --red:#ff5a6a;
  --gold:#ffd36a;
}

/* layout */
body{
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #18284a, var(--bg));
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{ width:420px; }

/* HEADER */
.header{
  text-align:center;
  margin-bottom:16px;
}

h1{ margin:0; font-size:1.6rem; }

.sub{ color:var(--muted); font-size:0.9rem; }

/* BOB CARD */
.bob-card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border-radius:18px;
  padding:18px;
  text-align:center;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
  border:1px solid #1f2a44;
}

/* bob */
#bob{
  width:140px;
  height:140px;
  transition: transform 0.4s ease;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{ transform:translateY(0px); }
  50%{ transform:translateY(-6px); }
}

/* mood states */
.happy{ filter: drop-shadow(0 0 8px #3ef0a8); }
.neutral{}
.tired{ filter: grayscale(0.4); }
.elite{ filter: drop-shadow(0 0 14px #ffd36a); transform:scale(1.08); }

/* XP BAR */
.xp-wrap{
  margin-top:10px;
  background:#0a1220;
  border-radius:10px;
  overflow:hidden;
  height:10px;
}

.xp-bar{
  height:10px;
  width:0%;
  background:linear-gradient(90deg,var(--green),var(--blue));
  transition: width 0.5s ease;
}

.level{
  font-size:0.85rem;
  margin-top:6px;
  color:var(--gold);
}

/* habits */
.habit{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid #1e2a44;
}

.title{ font-weight:600; }

.goal{
  font-size:0.85rem;
  color:var(--muted);
  margin:6px 0 10px;
}

.actions{
  display:flex;
  gap:8px;
}

button{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.done{ background:var(--green); }
.undo{ background:#26324d; color:var(--text); }

.streak{
  margin-top:6px;
  font-size:0.8rem;
  color:var(--gold);
}

/* phrase */
.phrase{
  text-align:center;
  font-size:0.85rem;
  color:var(--muted);
  margin:10px 0;
  font-style:italic;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🌱 Seedling Bob XP System</h1>
    <div class="sub">Level up your habits like a dev leveling skills</div>
  </div>

  <!-- BOB -->
  <div class="bob-card">

    <svg id="bob" viewBox="0 0 100 100">

      <!-- pot -->
      <rect x="30" y="72" width="40" height="18" rx="6" fill="#5a3d2b"/>

      <!-- stem -->
      <rect x="48" y="42" width="4" height="30" fill="#3ef0a8"/>

      <!-- leaf -->
      <path d="M50 42 C30 30, 30 12, 50 22 C70 12, 70 30, 50 42"
            fill="#3ef0a8" />

      <!-- face -->
      <circle id="eyeL" cx="45" cy="58" r="3" fill="#0b1020"/>
      <circle id="eyeR" cx="55" cy="58" r="3" fill="#0b1020"/>

      <path d="M45 66 Q50 69 55 66" stroke="#0b1020" fill="none"/>

      <!-- glasses -->
      <circle cx="45" cy="58" r="7" stroke="#4aa3ff" fill="none"/>
      <circle cx="55" cy="58" r="7" stroke="#4aa3ff" fill="none"/>
      <line x1="52" y1="58" x2="48" y2="58" stroke="#4aa3ff"/>

    </svg>

    <div class="xp-wrap">
      <div class="xp-bar" id="xpBar"></div>
    </div>

    <div class="level" id="levelText">Level 1 Seedling</div>

  </div>

  <div class="phrase" id="phrase"></div>

  <div id="habits"></div>

</div>

<script>

const habits = [
  { id:1, title:"Drink Water", goal:"Drink 8 glasses of water", log: new Set()},
  { id:2, title:"Code Practice", goal:"Code 1 hour", log: new Set()},
  { id:3, title:"Exercise", goal:"Workout 30 min", log: new Set()}
]
  habits.forEach(h => {
  const saved = localStorage.getItem(`habit-${h.id}-log`)
  h.log = new Set(saved ? JSON.parse(saved) : [])
})
  
const phrases = [
 "git commit -m 'I showed up'",
 "bugs fear consistency",
 "hydration = runtime stability",
 "streaks are just loops over discipline",
 "console.log('progress')",
 "no rollback on discipline",
 "deploy yourself daily",
 "refactor habits, not excuses",
 "null motivation detected → retry()",
 "your future self is reviewing this PR"
]

const container = document.getElementById("habits")
const xpBar = document.getElementById("xpBar")
const levelText = document.getElementById("levelText")
const phrase = document.getElementById("phrase")
const bob = document.getElementById("bob")

function today(){
  return new Date().toISOString().split("T")[0]
}

/* ---- CORE XP SYSTEM ---- */

function getXP(){
  let xp = 0
  habits.forEach(h=>{
    xp += h.log.size* 10
  })
  return xp
}

function getLevel(xp){
  return Math.floor(xp / 50) + 1
}

function updateUI(){

  const xp = getXP()
  const level = getLevel(xp)

  const progress = (xp % 50) / 50 * 100
  xpBar.style.width = progress + "%"

  levelText.textContent =
    `Level ${level} ${level < 3 ? "Seedling" : level < 6 ? "Sprout" : "Overgrown Dev"}`

  // bob mood
  bob.className = ""
  if(level < 3) bob.classList.add("neutral")
  else if(level < 6) bob.classList.add("happy")
  else bob.classList.add("elite")
}

/* ---- RENDER ---- */

function render(){
  container.innerHTML = ""

  habits.forEach(h=>{

    const div = document.createElement("div")
    div.className = "habit"

    const doneToday = h.log.has(today())

    div.innerHTML = `
      <div class="title">${h.title}</div>
      <div class="goal">Goal: ${h.goal}</div>

      <div class="actions">
        <button class="done">${doneToday ? "Done ✔" : "Complete"}</button>
        <button class="undo">Undo</button>
      </div>

      <div class="streak">
        XP Entries: ${h.log.size}
      </div>
    `

    const doneBtn = div.querySelector(".done")
    const undoBtn = div.querySelector(".undo")

    doneBtn.onclick = () => {
      h.log.add(today())
      localStorage.setItem(`habit-${h.id}-log`, JSON.stringify(Array.from(h.log)))
      phrase.textContent =
        phrases[Math.floor(Math.random()*phrases.length)]

      updateUI()
      render()
    }

    undoBtn.onclick = () => {
      h.log.delete(today())
      localStorage.setItem(`habit-${h.id}-log`, JSON.stringify(Array.from(h.log)))
      updateUI()
      render()
    }

    container.appendChild(div)
  })

  updateUI()
}

render()
phrase.textContent = "Initializing discipline runtime..."
</script>

</body>
</html>
