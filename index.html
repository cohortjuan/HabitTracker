<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habit Tracker</title>

<style>

* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;

  background:
    radial-gradient(circle at top left, rgba(120, 30, 60, 0.15), transparent 30%),
    #07111f;

  color: #f5f1fa;

  max-width: 540px;
  margin: 60px auto;
  padding: 0 20px;
}

/* HEADER */
.title {
  font-family: Georgia, serif;
  font-size: 3rem;
  font-weight: 700;
  color: #d4b24c;
  margin-bottom: 8px;
  position: relative;
}

.title::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -10px;
  width: 80px;
  height: 2px;
  background: rgba(212, 178, 76, 0.6);
}

.subtitle {
  color: rgba(140, 150, 180, 0.8);
  font-style: italic;
  margin-bottom: 24px;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
}

li {
  margin-bottom: 14px;
}

label {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 16px 18px;

  background: rgba(24, 32, 52, 0.96);

  border: 1px solid rgba(139, 30, 63, 0.35);

  border-radius: 14px;

  cursor: pointer;

  transition: 0.2s ease;
}

label:hover {
  transform: translateY(-1px);
  border-color: rgba(212, 178, 76, 0.4);
}

.plant {
  font-size: 1.25rem;
  transition: 0.15s ease;
  margin-right: 12px;
}

.habit-text {
  flex: 1;
}

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #b38a3d;
}

/* BREATHING */
.breathe-button {
  margin-top: 10px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #b38a3d;
  color: #07111f;
  font-weight: bold;
  cursor: pointer;
}

.breathing-box {
  display: none;
  margin-top: 12px;
  padding: 20px;
  border-radius: 14px;
  background: rgba(24, 32, 52, 0.96);
  text-align: center;
}

.breathing-box.active {
  display: block;
}

.breathing-circle {
  width: 110px;
  height: 110px;
  margin: 0 auto 16px;
  border-radius: 50%;
  border: 2px solid #d4b24c;
  background: rgba(212, 178, 76, 0.12);
  animation: breathe 8s infinite ease-in-out;
}

@keyframes breathe {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.2); }
  100% { transform: scale(0.8); }
}

</style>
</head>

<body>

<h1 class="title">Today's Progress</h1>
<p class="subtitle">Habit Garden Tracker</p>

<ul>

  <li>
    <label>
      <span class="plant" data-id="water">🌰</span>
      <span class="habit-text">Drink Water</span>
      <input type="checkbox" class="habit" data-id="water">
    </label>
  </li>

  <li>
    <label>
      <span class="plant" data-id="active">🌰</span>
      <span class="habit-text">Get Active</span>
      <input type="checkbox" class="habit" data-id="active">
    </label>
  </li>

  <li>
    <label>
      <span class="plant" data-id="sleep">🌰</span>
      <span class="habit-text">Sleep Well</span>
      <input type="checkbox" class="habit" data-id="sleep">
    </label>
  </li>

  <li>

    <label>
      <span class="plant" data-id="stress">🌰</span>
      <span class="habit-text">Breathe / Stress</span>
      <input type="checkbox" class="habit" data-id="stress">
    </label>

    <button class="breathe-button" id="breatheBtn">BREATHE</button>

    <div class="breathing-box" id="breathingBox">
      <div class="breathing-circle"></div>
      <div id="breathText">Breathe In</div>
    </div>

  </li>

</ul>

<script>

document.addEventListener("DOMContentLoaded", () => {

/* =========================
   DATA
========================= */

const habits = document.querySelectorAll(".habit");

const today = () =>
  new Date().toISOString().slice(0, 10);

function load(id) {
  return JSON.parse(localStorage.getItem(id)) || { days: [] };
}

function save(id, data) {
  localStorage.setItem(id, JSON.stringify(data));
}

/* =========================
   STREAK
========================= */

function streak(set) {
  let count = 0;
  let d = new Date();

  while (set.has(d.toISOString().slice(0,10))) {
    count++;
    d.setDate(d.getDate() - 1);
  }

  return count;
}

/* =========================
   PLANT
========================= */

function plantEmoji(n) {
  if (n >= 30) return "🌳";
  if (n >= 14) return "🌷";
  if (n >= 7) return "🌿";
  if (n >= 3) return "🌱";
  return "🌰";
}

function update(id, plantEl) {
  const data = load(id);
  const set = new Set(data.days);

  const s = streak(set);

  plantEl.textContent = plantEmoji(s);
}

/* =========================
   EVENTS
========================= */

habits.forEach(cb => {

  const id = cb.dataset.id;
  const plant = cb.parentElement.querySelector(".plant");

  update(id, plant);

  cb.addEventListener("change", () => {

    const data = load(id);
    const set = new Set(data.days);

    const t = today();

    set.has(t) ? set.delete(t) : set.add(t);

    save(id, { days: [...set] });

    update(id, plant);
  });

});

/* =========================
   BREATHING (SAFE)
========================= */

const btn = document.getElementById("breatheBtn");
const box = document.getElementById("breathingBox");
const text = document.getElementById("breathText");

if (btn && box && text) {

  const phases = ["Breathe In", "Hold", "Breathe Out", "Hold"];
  const times = [4000, 2000, 4000, 2000];

  let i = 0;

  function loop() {
    if (!box.classList.contains("active")) return;

    text.textContent = phases[i];

    setTimeout(() => {
      i = (i + 1) % phases.length;
      loop();
    }, times[i]);
  }

  btn.addEventListener("click", () => {
    box.classList.toggle("active");
    if (box.classList.contains("active")) loop();
  });

}

});

</script>

</body>
</html>
