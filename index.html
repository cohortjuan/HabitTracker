<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seedling Bob Habit Tracker</title>

<style>
:root {
  --bg:#0b1220;
  --card:#121a2b;
  --text:#e8f0ff;
  --muted:#7f8aa3;
  --green:#38d996;
  --blue:#4aa3ff;
  --red:#ff5a6a;
  --gold:#ffd36a;
}

body {
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #14213d, var(--bg));
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container { width: 420px; }

.header {
  text-align:center;
  margin-bottom:20px;
}

h1 {
  margin:0;
  font-size:1.6rem;
}

.subtitle {
  color:var(--muted);
  font-size:0.9rem;
}

/* BOB */
.bob-wrap {
  background:var(--card);
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}

#bob {
  width:140px;
  height:140px;
  margin:auto;
  transition: transform 0.4s ease;
}

/* growth stages */
.baby   { transform: scale(0.9); }
.sprout { transform: scale(1.0); }
.grown  { transform: scale(1.15); }
.elite  { transform: scale(1.3); filter: drop-shadow(0 0 10px #38d996); }

/* watering animation */
.water {
  animation: waterPulse 0.6s ease;
}

@keyframes waterPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05) rotate(-2deg); }
  100% { transform: scale(1); }
}

/* habit cards */
.habit {
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid #1f2a44;
}

.habit-title {
  font-weight:600;
}

.goal {
  font-size:0.85rem;
  color:var(--muted);
  margin-bottom:10px;
}

.actions {
  display:flex;
  gap:8px;
}

button {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.done { background:var(--green); color:#07140e; }
.undo { background:#2a3552; color:var(--text); }

/* streak */
.streak {
  font-size:0.8rem;
  color:var(--gold);
  margin-top:6px;
}

/* phrases */
.phrase {
  text-align:center;
  font-size:0.85rem;
  color:var(--muted);
  margin:10px 0;
  font-style:italic;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🌱 Seedling Bob Tracker</h1>
    <div class="subtitle">Grow Bob by completing real dev habits</div>
  </div>

  <!-- BOB -->
  <div class="bob-wrap">
    <svg id="bob" viewBox="0 0 100 100">
      <!-- pot -->
      <rect x="30" y="70" width="40" height="20" rx="6" fill="#5a3d2b"/>
      <!-- stem -->
      <rect x="48" y="40" width="4" height="30" fill="#38d996"/>
      <!-- leaf -->
      <path id="leaf" d="M50 40 C30 30, 30 10, 50 20 C70 10, 70 30, 50 40"
            fill="#38d996"/>
      <!-- face -->
      <circle cx="45" cy="55" r="3" fill="#0b1220"/>
      <circle cx="55" cy="55" r="3" fill="#0b1220"/>
      <path d="M45 62 Q50 66 55 62" stroke="#0b1220" fill="none"/>

      <!-- glasses -->
      <circle cx="45" cy="55" r="7" stroke="#4aa3ff" fill="none"/>
      <circle cx="55" cy="55" r="7" stroke="#4aa3ff" fill="none"/>
      <line x1="52" y1="55" x2="48" y2="55" stroke="#4aa3ff"/>
    </svg>
  </div>

  <div id="phrase" class="phrase"></div>

  <!-- HABITS -->
  <div id="habits"></div>

</div>

<script>
const phrases = [
 "Commit > regret. Push your habits.",
 "No bugs in discipline, only features.",
 "Console.log('I showed up')",
 "Small commits daily > big rewrites weekly",
 "Refactor your life one task at a time",
 "Streak > motivation",
 "Ship it even if it’s ugly",
 "If (!done) { keepGoing(); }",
 "Hydrate like you're debugging production",
 "Your future self is reviewing this PR"
]

const habits = [
  { id:1, title:"Drink Water", goal:"Drink 8 glasses of water", streak:0, last:null },
  { id:2, title:"Code Practice", goal:"Code 1 hour daily", streak:0, last:null },
  { id:3, title:"Exercise", goal:"Workout 30 minutes", streak:0, last:null }
]

const habitContainer = document.getElementById("habits")
const bob = document.getElementById("bob")
const phraseEl = document.getElementById("phrase")

function save() {
  localStorage.setItem("habits", JSON.stringify(habits))
}

function load() {
  const data = JSON.parse(localStorage.getItem("habits"))
  if (data) Object.assign(habits, data)
}

function today() {
  return new Date().toISOString().split("T")[0]
}

function updateGrowth() {
  const total = habits.reduce((a,b)=>a + b.streak,0)

  bob.classList.remove("baby","sprout","grown","elite")

  if (total < 3) bob.classList.add("baby")
  else if (total < 7) bob.classList.add("sprout")
  else if (total < 12) bob.classList.add("grown")
  else bob.classList.add("elite")
}

function render() {
  habitContainer.innerHTML = ""

  habits.forEach(h => {
    const div = document.createElement("div")
    div.className = "habit"

    div.innerHTML = `
      <div class="habit-title">${h.title}</div>
      <div class="goal">Goal: ${h.goal}</div>

      <div class="actions">
        <button class="done">Complete</button>
        <button class="undo">Undo</button>
      </div>

      <div class="streak">🔥 Streak: ${h.streak}</div>
    `

    const doneBtn = div.querySelector(".done")
    const undoBtn = div.querySelector(".undo")

    doneBtn.onclick = () => {
      const t = today()
      if (h.last !== t) {
        h.streak += 1
        h.last = t
        bob.classList.add("water")
        setTimeout(()=>bob.classList.remove("water"),600)
      }
      phraseEl.textContent = phrases[Math.floor(Math.random()*phrases.length)]
      save()
      render()
      updateGrowth()
    }

    undoBtn.onclick = () => {
      if (h.streak > 0) h.streak--
      save()
      render()
      updateGrowth()
    }

    habitContainer.appendChild(div)
  })
}

load()
render()
updateGrowth()
phraseEl.textContent = "Initialize discipline module..."
</script>

</body>
</html>
